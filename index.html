        <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={async()=>{
          for(const p of activePlayers){ await api.post({action:"setAvailability",playerId:p.PlayerID,matchId:showMatch.MatchID,status:"no"}); }
          reload(); notify("All players marked unavailable");
        }}>All unavailable</button>
      </div>
      {activePlayers.map(p=>{
        const cur=(availability[showMatch.MatchID]||{})[p.PlayerID]||"tbd";
        const key=showMatch.MatchID+"_"+p.PlayerID;
        return <div key={p.PlayerID} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid var(--border)"}}>
          <span style={{flex:1,fontWeight:500,fontSize:14}}>{p.Name}</span>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setStatus(p.PlayerID,showMatch.MatchID,"yes")} disabled={saving[key]}
              style={{padding:"6px 14px",borderRadius:8,border:"1.5px solid",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"var(--font)",
                background:cur==="yes"?"var(--gbg)":"var(--bg3)",color:cur==="yes"?"var(--green)":"var(--text2)",borderColor:cur==="yes"?"var(--gborder)":"var(--border)"}}>
              {saving[key]?"…":"✓"}
            </button>
            <button onClick={()=>setStatus(p.PlayerID,showMatch.MatchID,"no")} disabled={saving[key]}
              style={{padding:"6px 14px",borderRadius:8,border:"1.5px solid",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"var(--font)",
                background:cur==="no"?"var(--rbg)":"var(--bg3)",color:cur==="no"?"var(--red)":"var(--text2)",borderColor:cur==="no"?"var(--rborder)":"var(--border)"}}>
              {saving[key]?"…":"✕"}
            </button>
          </div>
        </div>;
      })}
    </Modal>}

    {/* Individual send links */}
    <div className="section-hdr"><span className="section-title">Send individual links</span></div>
    {activePlayers.map(p=>{ const link=`${baseUrl}?player=${p.PlayerID}`; const msg=`Hey ${p.Name.split(" ")[0]}, please mark your availability: ${link}`;
      return <div key={p.PlayerID} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
        <span style={{flex:1,fontWeight:500,fontSize:14}}>{p.Name}</span>
        {p.Phone?<a className="btn btn-wa btn-sm" href={waLink(p.Phone,msg)} target="_blank">Send</a>
          :<button className="btn btn-ghost btn-sm" onClick={()=>{navigator.clipboard.writeText(link).catch(()=>{}); notify(`Link copied for ${p.Name}`);}}>Copy link</button>}
      </div>; })}
  </div>;
}

// ── FINANCE ──────────────────────────────────────────────────────
function Finance({data,reload,notify}){
  const {players=[],matches=[],availability={},payments={},config={}}=data;
  const [tab,setTab]=useState("purse");
  const [showPlayerDetail,setShowPlayerDetail]=useState(null);
  const [showSettleMatch,setShowSettleMatch]=useState(null);
  const [saving,setSaving]=useState(false);
  const [payAmt,setPayAmt]=useState("");
  const [payNote,setPayNote]=useState("");
  const melbNow=()=>{ const d=new Date(new Date().toLocaleString('en-US',{timeZone:'Australia/Melbourne'})); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };

  // Load settled matches from localStorage (simple flag, not financial data)
  const [settledMatches,setSettledMatches]=useState(()=>{
    try{ return JSON.parse(localStorage.getItem("mcc_settled_v1")||"[]"); }catch(e){ return []; }
  });
  const toggleSettle=(matchId)=>{
    const next=settledMatches.includes(matchId)?settledMatches.filter(x=>x!==matchId):[...settledMatches,matchId];
    setSettledMatches(next);
    localStorage.setItem("mcc_settled_v1",JSON.stringify(next));
    notify(settledMatches.includes(matchId)?"Match unsettled":"Match marked as settled");
  };

  const today=melbNow();
  const pastMatches=matches.filter(m=>toDateStr(m.Date)<today);
  const stats=calcStats(players,matches,availability,payments);

  // Team purse = total money collected from all players
  const teamPurse=stats.reduce((s,p)=>s+p.totalAdvance,0);
  // Total match costs (past matches only)
  const totalCosts=pastMatches.reduce((s,m)=>s+tc(m),0);
  // Unsettled = past matches not yet settled
  const unsettledMatches=pastMatches.filter(m=>!settledMatches.includes(m.MatchID));
  const unsettledCosts=unsettledMatches.reduce((s,m)=>s+tc(m),0);
  const settledCosts=pastMatches.filter(m=>settledMatches.includes(m.MatchID)).reduce((s,m)=>s+tc(m),0);
  // Per player outstanding
  const totalDue=stats.reduce((s,p)=>s+(p.balance<0?Math.abs(p.balance):0),0);
  const currentPurse=teamPurse-settledCosts;

  const sortedStats=[...stats].sort((a,b)=>a.balance-b.balance); // most negative first

  const balMsg=s=>`Hey ${s.Name.split(" ")[0]},\n\nYour MCC cricket summary:\nGames played: ${s.gamesPlayed}\nOwed: $${Math.round(s.totalOwed)}\nAdvance paid: $${Math.round(s.totalAdvance)}\nBalance: ${s.balance>=0?"$"+Math.round(s.balance)+" in credit":"$"+Math.round(Math.abs(s.balance))+" due"}${s.balance<-0.5?`\n\nPlease pay via PayID: ${config?.PayID||"add PayID in Settings"}`:""}`;

  const saveAdvance=async(p,amount,note)=>{
    setSaving(true);
    try{
      await api.post({action:"addPayment",playerId:p.PlayerID,amount:Number(amount),date:melbNow(),note:note||"Payment"});
      notify(`$${amount} recorded for ${p.Name}`);
      setShowPlayerDetail(null);
      reload();
    }catch(e){alert(e.message);}finally{setSaving(false);}
  };

  return <div className="page">
    <div className="page-title">Finance</div>
    <div className="page-sub">Team purse, match costs & player balances</div>

    {/* ── TEAM PURSE BANNER ── */}
    <div style={{background:"linear-gradient(135deg,rgba(129,140,248,0.12),var(--bg3))",border:"1px solid var(--acborder)",borderRadius:"var(--rl)",padding:"16px",marginBottom:16}}>
      <div style={{fontSize:11,fontWeight:600,color:"var(--accent)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Team Purse</div>
      <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:4}}>
        <div style={{fontSize:36,fontWeight:600,letterSpacing:"-1.5px",color:currentPurse>=0?"var(--green)":"var(--red)"}}>${Math.round(currentPurse)}</div>
        <div style={{fontSize:13,color:"var(--text2)"}}>remaining</div>
      </div>
      <div style={{height:6,background:"var(--bg4)",borderRadius:3,overflow:"hidden",marginBottom:10}}>
        <div style={{height:"100%",borderRadius:3,background:currentPurse>=0?"var(--green)":"var(--red)",width:teamPurse>0?Math.min(100,Math.max(0,(currentPurse/teamPurse)*100))+"%":"0%",transition:"width .4s"}}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
        <div style={{background:"rgba(0,0,0,0.2)",borderRadius:8,padding:"9px 10px"}}>
          <div style={{fontSize:16,fontWeight:600,color:"var(--green)"}}>${Math.round(teamPurse)}</div>
          <div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>COLLECTED</div>
        </div>
        <div style={{background:"rgba(0,0,0,0.2)",borderRadius:8,padding:"9px 10px"}}>
          <div style={{fontSize:16,fontWeight:600,color:"var(--amber)"}}>${Math.round(settledCosts)}</div>
          <div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>SPENT</div>
        </div>
        <div style={{background:"rgba(0,0,0,0.2)",borderRadius:8,padding:"9px 10px"}}>
          <div style={{fontSize:16,fontWeight:600,color:"var(--red)"}}>${Math.round(totalDue)}</div>
          <div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>STILL DUE</div>
        </div>
      </div>
    </div>

    {/* ── TABS ── */}
    <div className="tabs">
      <button className={"tab-btn"+(tab==="purse"?" active":"")} onClick={()=>setTab("purse")}>Players</button>
      <button className={"tab-btn"+(tab==="matches"?" active":"")} onClick={()=>setTab("matches")}>Match costs</button>
    </div>

    {/* ── PLAYERS TAB ── */}
    {tab==="purse"&&<>
      <div className="card">
        {sortedStats.map((s,i)=>{
          const isLast=i===sortedStats.length-1;
          const pct=s.totalOwed>0?Math.min(100,(s.totalAdvance/s.totalOwed)*100):100;
          return <div key={s.PlayerID} onClick={()=>{setShowPlayerDetail(s);setPayAmt("");setPayNote("");}}
            style={{padding:"11px 14px",borderBottom:isLast?"none":"1px solid var(--border)",cursor:"pointer"}}
            onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.02)"}
            onMouseLeave={e=>e.currentTarget.style.background=""}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:5}}>
              <span style={{fontWeight:600,fontSize:14,flex:1}}>{s.Name}</span>
              <span style={{fontSize:11,color:"var(--text3)"}}>{s.gamesPlayed} game{s.gamesPlayed!==1?"s":""}</span>
              <span style={{fontWeight:700,fontSize:14,fontFamily:"var(--mono)",color:s.balance>=0?"var(--green)":"var(--red)",minWidth:50,textAlign:"right"}}>{s.balance>=0?"+":"-"}${Math.abs(Math.round(s.balance))}</span>
              <span style={{color:"var(--text3)",fontSize:13}}>›</span>
            </div>
            <div style={{height:3,background:"var(--bg3)",borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:2,background:s.balance>=0?"var(--green)":"var(--amber)",width:pct+"%",transition:"width .3s"}}/>
            </div>
          </div>;
        })}
      </div>
    </>}

    {/* ── MATCH COSTS TAB ── */}
    {tab==="matches"&&<>
      {pastMatches.length===0&&<div style={{color:"var(--text3)",fontSize:13,textAlign:"center",padding:"32px 0"}}>No past matches yet</div>}
      {pastMatches.sort((a,b)=>toDateStr(b.Date).localeCompare(toDateStr(a.Date))).map(m=>{
        const totalC=tc(m);
        const y=Object.values(availability[m.MatchID]||{}).filter(v=>v==="yes").length;
        const cpp=y>0?Math.round(totalC/y):0;
        const isSettled=settledMatches.includes(m.MatchID);
        const playersWhoOwe=stats.filter(p=>{
          const played=(availability[m.MatchID]||{})[p.PlayerID]==="yes";
          return played && p.balance<-0.5;
        });
        return <div key={m.MatchID} className="card" style={{marginBottom:10,opacity:isSettled?.6:1}}>
          <div style={{padding:"12px 14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontWeight:600,fontSize:14}}>{m.Round}</span>
                  {isSettled&&<span className="badge g" style={{fontSize:10}}>Settled</span>}
                </div>
                <div style={{fontSize:11,color:"var(--text3)",marginTop:1,fontFamily:"var(--mono)"}}>{fmt(m.Date)}{m.Opponent?` · vs ${m.Opponent}`:""}</div>
              </div>
              {totalC>0&&<div style={{textAlign:"right"}}>
                <div style={{fontWeight:600,fontFamily:"var(--mono)",color:"var(--accent)"}}>${Math.round(totalC)}</div>
                <div style={{fontSize:11,color:"var(--text3)"}}>{y} players · ${cpp}/each</div>
              </div>}
            </div>
            {totalC>0&&<div style={{fontSize:12,color:"var(--text2)",display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
              {m.GroundHire>0&&<span>Ground ${m.GroundHire}</span>}
              {m.Balls>0&&<span>Balls ${m.Balls}</span>}
              {m.Umpire>0&&<span>Umpire ${m.Umpire}</span>}
              {m.MatchFee>0&&<span>Fee ${m.MatchFee}</span>}
              {m.Extras>0&&<span>Extras ${m.Extras}</span>}
            </div>}
            {!isSettled&&playersWhoOwe.length>0&&<div style={{background:"var(--rbg)",borderRadius:8,padding:"7px 10px",marginBottom:10,fontSize:12,color:"var(--red)"}}>
              {playersWhoOwe.length} player{playersWhoOwe.length!==1?"s":""} still owe from this match: {playersWhoOwe.map(p=>p.Name.split(" ")[0]).join(", ")}
            </div>}
            {totalC>0&&<div style={{display:"flex",gap:8}}>
              <button className={"btn btn-sm "+(isSettled?"btn-ghost":"btn-primary")} style={{flex:1}} onClick={()=>toggleSettle(m.MatchID)}>
                {isSettled?"Unsettle":"Mark as settled"}
              </button>
              <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={()=>setShowSettleMatch(m)}>View players</button>
            </div>}
          </div>
        </div>;
      })}


    </>}

    {/* ── PLAYER DETAIL MODAL ── */}
    {showPlayerDetail&&<Modal title={showPlayerDetail.Name} onClose={()=>setShowPlayerDetail(null)}
      footer={<><button className="btn btn-ghost" onClick={()=>setShowPlayerDetail(null)}>Close</button>
        {payAmt&&<button className="btn btn-primary" onClick={()=>saveAdvance(showPlayerDetail,payAmt,payNote)} disabled={saving}>{saving?"…":"Record $"+payAmt}</button>}</>}>
      <div style={{background:"var(--bg3)",borderRadius:10,padding:"14px",marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:13}}>
          <span style={{color:"var(--text2)"}}>Games played</span><span style={{fontWeight:600}}>{showPlayerDetail.gamesPlayed}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:13}}>
          <span style={{color:"var(--text2)"}}>Total owed</span><span style={{fontFamily:"var(--mono)"}}>${Math.round(showPlayerDetail.totalOwed)}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,fontSize:13}}>
          <span style={{color:"var(--text2)"}}>Advance paid</span><span style={{fontFamily:"var(--mono)",color:"var(--green)"}}>${Math.round(showPlayerDetail.totalAdvance)}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:700,borderTop:"1px solid var(--border)",paddingTop:10}}>
          <span>Balance</span>
          <span style={{color:showPlayerDetail.balance>=0?"var(--green)":"var(--red)",fontFamily:"var(--mono)"}}>{showPlayerDetail.balance>=0?"+":"-"}${Math.abs(Math.round(showPlayerDetail.balance))}</span>
        </div>
      </div>
      <div style={{marginBottom:14}}>
        <label className="form-label">Record payment</label>
        <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
          {[Math.abs(Math.round(showPlayerDetail.balance)),20,50,100].filter((v,i,a)=>v>0&&a.indexOf(v)===i).map(v=>
            <button key={v} className="btn btn-ghost btn-sm" onClick={()=>setPayAmt(String(v))} style={{background:payAmt==String(v)?"var(--acbg)":"",borderColor:payAmt==String(v)?"var(--acborder)":""}}>${v}</button>
          )}
        </div>
        <div className="form-row">
          <input type="number" min="0" value={payAmt} onChange={e=>setPayAmt(e.target.value)} placeholder="Amount ($)"/>
          <input value={payNote} onChange={e=>setPayNote(e.target.value)} placeholder="Note (optional)"/>
        </div>
      </div>
      {showPlayerDetail.Phone&&<a className="btn btn-wa btn-full" href={waLink(showPlayerDetail.Phone,balMsg(showPlayerDetail))} target="_blank" style={{textDecoration:"none"}}>Send balance via WhatsApp</a>}
    </Modal>}

    {/* ── MATCH PLAYERS MODAL ── */}
    {showSettleMatch&&<Modal title={`${showSettleMatch.Round} — players`} onClose={()=>setShowSettleMatch(null)}>
      {stats.filter(p=>(availability[showSettleMatch.MatchID]||{})[p.PlayerID]==="yes").map(p=>{
        const share=Math.round(tc(showSettleMatch)/(Object.values(availability[showSettleMatch.MatchID]||{}).filter(v=>v==="yes").length||1));
        return <div key={p.PlayerID} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
          <span style={{flex:1,fontWeight:500}}>{p.Name}</span>
          <span style={{fontFamily:"var(--mono)",fontSize:12,color:"var(--text2)"}}>${share}/game</span>
          <span style={{fontFamily:"var(--mono)",fontWeight:600,color:p.balance>=0?"var(--green)":"var(--red)",minWidth:60,textAlign:"right"}}>{p.balance>=0?"+":"-"}${Math.abs(Math.round(p.balance))}</span>
        </div>;
      })}
    </Modal>}
  </div>;
}

function Settings({data,reload,notify}){
  const {config={},players=[],matches=[]}=data;
  const [showNewSeason,setShowNewSeason]=useState(false),[nsName,setNsName]=useState(""),[saving,setSaving]=useState(false);
  const updCfg=async(key,value)=>{ try{await api.post({action:"updateConfig",key,value});notify("Saved");reload();}catch(e){alert(e.message);} };
  const createSeason=async()=>{ if(!nsName.trim())return; setSaving(true); try{await api.post({action:"createSeason",seasonName:nsName});notify("New season created!");setShowNewSeason(false);reload();}catch(e){alert(e.message);}finally{setSaving(false);} };
  const cfgFields=[["SeasonName","Season name"],["ClubName","Club name"],["MinPlayersNeeded","Min players needed"],["TargetSquadSize","Target squad size"],["PayID","PayID (phone number)"],["CaptainName","Captain name"],["CaptainPhone","Captain phone"]];

  return <div className="page">
    <div className="page-title">Settings</div>
    <div className="page-sub">Season config · tap any value to edit</div>
    <div className="card" style={{marginBottom:14}}>
      <div className="card-hdr"><span className="card-title">Season config</span></div>
      {cfgFields.map(([k,lbl])=><div key={k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 15px",borderBottom:"1px solid var(--border)"}}>
        <span style={{fontSize:12,color:"var(--text2)",fontWeight:500,flexShrink:0,marginRight:12}}>{lbl}</span>
        <span style={{fontSize:14,textAlign:"right"}}><InlineEdit value={String(config[k]||"")} onSave={v=>updCfg(k,v)} placeholder="tap to set"/></span>
      </div>)}
    </div>
    <div className="card">
      <div className="card-hdr"><span className="card-title">New season</span></div>
      <div style={{padding:15}}>
        <div style={{fontSize:13,color:"var(--text2)",marginBottom:12,lineHeight:1.7}}>Clears schedule, availability, and payments — keeps players. Old data stays in the sheet.</div>
        <div style={{display:"flex",gap:10,marginBottom:12}}>
          <div style={{background:"var(--bg3)",borderRadius:8,padding:"9px 12px",flex:1,textAlign:"center"}}><div style={{fontSize:20,fontWeight:600}}>{players.length}</div><div style={{fontSize:10,color:"var(--text3)"}}>PLAYERS KEPT</div></div>
          <div style={{background:"var(--bg3)",borderRadius:8,padding:"9px 12px",flex:1,textAlign:"center"}}><div style={{fontSize:20,fontWeight:600}}>{matches.length}</div><div style={{fontSize:10,color:"var(--text3)"}}>MATCHES CLEARED</div></div>
        </div>
        <button className="btn btn-danger btn-full" onClick={()=>setShowNewSeason(true)}>🔄 Start new season</button>
      </div>
    </div>
    {showNewSeason&&<Modal title="Start New Season" onClose={()=>setShowNewSeason(false)} footer={<><button className="btn btn-ghost" onClick={()=>setShowNewSeason(false)}>Cancel</button><button className="btn btn-primary" onClick={createSeason} disabled={saving}>{saving?"…":"Create"}</button></>}>
      <div style={{fontSize:13,color:"var(--text2)",marginBottom:14,lineHeight:1.7}}>This cannot be undone. All match, availability, and payment data will be cleared.</div>
      <div className="form-group"><label className="form-label">Season name *</label><input value={nsName} onChange={e=>setNsName(e.target.value)} placeholder="e.g. Winter 2026"/></div>
    </Modal>}
  </div>;
}


// ── EXTRAS (non-match expense splitter) ─────────────────────────
function Extras({data,reload,notify}){
  const {players=[],config={}}=data;
  const expenses=data.extras||[];
  const [showAdd,setShowAdd]=useState(false);
  const [showManage,setShowManage]=useState(null); // expense being managed (send/track payments)
  const [saving,setSaving]=useState(false);
  const melbNow=()=>{ const d=new Date(new Date().toLocaleString('en-US',{timeZone:'Australia/Melbourne'})); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
  const [eForm,setEForm]=useState({title:"",amount:"",date:melbNow(),note:""});
  const [involved,setInvolved]=useState([]);
  const [overrides,setOverrides]=useState({});

  // Extra payments stored in localStorage keyed by extraId+playerId
  const [extraPayments,setExtraPayments]=useState(()=>{
    try{ return JSON.parse(localStorage.getItem("mcc_extra_payments_v1")||"{}"); }catch(e){ return {}; }
  });
  const saveExtraPayments=(map)=>{ localStorage.setItem("mcc_extra_payments_v1",JSON.stringify(map)); setExtraPayments(map); };
  const isPaid=(extraId,playerId)=>!!(extraPayments[extraId+"_"+playerId]);
  const togglePaid=(extraId,playerId,share)=>{
    const key=extraId+"_"+playerId;
    const next={...extraPayments};
    if(next[key]){ delete next[key]; notify("Marked unpaid"); }
    else{ next[key]={amount:share,date:melbNow()}; notify("Marked as paid"); }
    saveExtraPayments(next);
  };
  const paidCount=(exp)=>(Array.isArray(exp.involved)?exp.involved:[]).filter(pid=>isPaid(exp.id,pid)).length;
  const paidAmount=(exp)=>(Array.isArray(exp.involved)?exp.involved:[]).filter(pid=>isPaid(exp.id,pid)).reduce((s,pid)=>s+Number((exp.shares||{})[pid]||0),0);

  const activePlayers=players.filter(p=>p.Active==="Yes");
  const toggleInvolved=(pid)=>setInvolved(prev=>prev.includes(pid)?prev.filter(x=>x!==pid):[...prev,pid]);

  const calcShares=(amount,involvedIds,overrideMap)=>{
    const total=Number(amount)||0;
    if(!Array.isArray(involvedIds)||involvedIds.length===0) return {};
    const totalOverrides=involvedIds.reduce((s,pid)=>s+(Number(overrideMap[pid])||0),0);
    const remaining=Math.max(0,total-totalOverrides);
    const evenCount=involvedIds.filter(pid=>!overrideMap[pid]).length;
    const evenShare=evenCount>0?Number((remaining/evenCount).toFixed(1)):0;
    return Object.fromEntries(involvedIds.map(pid=>[pid,overrideMap[pid]?Number(overrideMap[pid]):evenShare]));
  };

  const normExp=(exp)=>{
    exp.involved=Array.isArray(exp.Involved)?exp.Involved:Array.isArray(exp.involved)?exp.involved:(typeof (exp.Involved||exp.involved)==='string'?JSON.parse(exp.Involved||exp.involved||'[]'):[]);
    exp.shares=typeof (exp.Shares||exp.shares)==='string'?JSON.parse(exp.Shares||exp.shares||'{}'):(exp.Shares||exp.shares||{});
    exp.amount=exp.Amount||exp.amount||0;
    exp.title=exp.Title||exp.title||'';
    exp.date=exp.Date||exp.date||'';
    exp.note=exp.Note||exp.note||'';
    exp.id=exp.ExtraID||exp.id||'';
    return exp;
  };

  const addExpense=async()=>{
    if(!eForm.title.trim()||!eForm.amount||involved.length===0)return;
    setSaving(true);
    const shares=calcShares(eForm.amount,involved,overrides);
    const exp={id:"ex_"+Math.random().toString(36).slice(2,9),title:eForm.title,amount:Number(eForm.amount),date:eForm.date,note:eForm.note,involved,overrides:{...overrides},shares};
    try{
      await api.post({action:"addExtra",extra:exp});
      notify(`${eForm.title} added — $${Number(eForm.amount).toFixed(1)} split ${involved.length} ways`);
      setShowAdd(false);
      setEForm({title:"",amount:"",date:melbNow(),note:""});
      setInvolved([]);setOverrides({});
      reload();
    }catch(e){alert(e.message);}
    finally{setSaving(false);}
  };

  const deleteExpense=async(id)=>{
    if(!confirm("Delete this expense?"))return;
    try{
      await api.post({action:"deleteExtra",extraId:id});
      // also clear payments for this expense
      const next={...extraPayments};
      Object.keys(next).filter(k=>k.startsWith(id+"_")).forEach(k=>delete next[k]);
      saveExtraPayments(next);
      notify("Expense deleted");setShowManage(null);reload();
    }catch(e){alert(e.message);}
  };

  const buildMsg=(exp,pid)=>{
    const p=players.find(x=>x.PlayerID===pid);
    if(!p)return"";
    const share=(exp.shares||{})[pid]||0;
    return `Hey ${p.Name.split(" ")[0]},\n\n${exp.title} — ${fmt(exp.date||exp.Date)}\nTotal: $${Number(exp.amount).toFixed(1)}\nPeople: ${exp.involved.length}\nYour share: $${Number(share).toFixed(1)}\n${exp.note?`Note: ${exp.note}\n`:""}\nPlease pay via PayID: ${config?.PayID||"add PayID in Settings"}\n\nThanks.`;
  };

  const previewShares=calcShares(eForm.amount,involved,overrides);
  const totalExpenses=(data.extras||[]).reduce((s,e)=>s+Number(e.Amount||e.amount||0),0);
  const normExpenses=expenses.filter(e=>e&&(e.ExtraID||e.id)).map(normExp);

  return <div className="page">
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
      <div><div className="page-title">Extras</div><div className="page-sub">Non-match expenses — pizza, nets, gear etc.</div></div>
      <button className="btn btn-primary btn-sm" onClick={()=>{setEForm({title:"",amount:"",date:melbNow(),note:""});setInvolved([]);setOverrides({});setShowAdd(true);}}>+ Add</button>
    </div>

    {normExpenses.length>0&&<div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"var(--rl)",padding:"12px 14px",marginBottom:14,display:"flex",gap:20}}>
      <div><div style={{fontSize:20,fontWeight:600,color:"var(--accent)"}}>{normExpenses.length}</div><div style={{fontSize:10,color:"var(--text3)"}}>EXPENSES</div></div>
      <div><div style={{fontSize:20,fontWeight:600}}>${Number(totalExpenses).toFixed(1)}</div><div style={{fontSize:10,color:"var(--text3)"}}>TOTAL</div></div>
      <div><div style={{fontSize:20,fontWeight:600,color:"var(--green)"}}>${normExpenses.reduce((s,e)=>s+paidAmount(e),0).toFixed(1)}</div><div style={{fontSize:10,color:"var(--text3)"}}>COLLECTED</div></div>
      <div><div style={{fontSize:20,fontWeight:600,color:"var(--red)"}}>${Math.max(0,totalExpenses-normExpenses.reduce((s,e)=>s+paidAmount(e),0)).toFixed(1)}</div><div style={{fontSize:10,color:"var(--text3)"}}>OUTSTANDING</div></div>
    </div>}

    {normExpenses.length===0&&<div style={{textAlign:"center",color:"var(--text3)",padding:"40px 0"}}>
      <div style={{fontSize:32,marginBottom:10}}>🍕</div>
      <div style={{fontSize:14}}>No extras yet</div>
    </div>}

    {normExpenses.map(exp=>{
      const pc=paidCount(exp), total=exp.involved.length, pa=paidAmount(exp);
      const allPaid=pc===total&&total>0;
      return <div key={exp.id} className="card" style={{marginBottom:10,opacity:allPaid?.75:1}}>
        <div style={{padding:"13px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontWeight:600,fontSize:15}}>{exp.title}</span>
                {allPaid&&<span className="badge g" style={{fontSize:10}}>Settled</span>}
              </div>
              <div style={{fontSize:12,color:"var(--text3)",marginTop:1}}>{fmt(exp.date)}{exp.note?` · ${exp.note}`:""}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontWeight:600,color:"var(--accent)",fontFamily:"var(--mono)"}}>${Number(exp.amount).toFixed(1)}</div>
              <div style={{fontSize:11,color:"var(--text3)"}}>{pc}/{total} paid</div>
            </div>
          </div>

          {/* Payment progress bar */}
          <div style={{height:4,background:"var(--bg3)",borderRadius:2,overflow:"hidden",marginBottom:10}}>
            <div style={{height:"100%",borderRadius:2,background:"var(--green)",width:total>0?(pc/total*100)+"%":"0%",transition:"width .3s"}}/>
          </div>

          {/* Per-person chips with paid status */}
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
            {exp.involved.map(pid=>{
              const p=players.find(x=>x.PlayerID===pid);
              if(!p)return null;
              const share=Number((exp.shares||{})[pid]||0);
              const paid=isPaid(exp.id,pid);
              return <div key={pid} onClick={()=>togglePaid(exp.id,pid,share)}
                style={{display:"flex",alignItems:"center",gap:5,padding:"5px 9px",borderRadius:8,cursor:"pointer",
                  background:paid?"var(--gbg)":"var(--bg3)",border:paid?"1px solid var(--gborder)":"1px solid var(--border)",
                  transition:"all .15s"}}>
                <span style={{fontSize:12,fontWeight:500,color:paid?"var(--green)":"var(--text2)"}}>{p.Name.split(" ")[0]}</span>
                <span style={{fontSize:11,fontFamily:"var(--mono)",color:paid?"var(--green)":"var(--accent)"}}>${share.toFixed(1)}</span>
                {paid&&<span style={{fontSize:10,color:"var(--green)"}}>✓</span>}
              </div>;
            })}
          </div>

          <div style={{fontSize:11,color:"var(--text3)",marginBottom:10}}>Tap a name to mark paid/unpaid</div>

          <div className="btn-row">
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowManage(exp)}>Send reminders</button>
            <button className="btn btn-danger btn-sm" onClick={()=>deleteExpense(exp.id)}>Delete</button>
          </div>
        </div>
      </div>;
    })}

    {/* ADD MODAL */}
    {showAdd&&<Modal title="Add expense" onClose={()=>setShowAdd(false)} footer={
      <><button className="btn btn-ghost" onClick={()=>setShowAdd(false)}>Cancel</button>
      <button className="btn btn-primary" onClick={addExpense} disabled={!eForm.title||!eForm.amount||involved.length===0||saving}>{saving?"Saving…":"Add Expense"}</button></>
    }>
      <div className="form-group"><label className="form-label">What was it? *</label><input value={eForm.title} onChange={e=>setEForm(f=>({...f,title:e.target.value}))} placeholder="e.g. Nets, Pizza, Drinks"/></div>
      <div className="form-row">
        <div className="form-group"><label className="form-label">Total ($) *</label><input type="number" min="0" value={eForm.amount} onChange={e=>setEForm(f=>({...f,amount:e.target.value}))} placeholder="0.00"/></div>
        <div className="form-group"><label className="form-label">Date</label><input type="date" value={eForm.date} onChange={e=>setEForm(f=>({...f,date:e.target.value}))}/></div>
      </div>
      <div className="form-group"><label className="form-label">Note (optional)</label><input value={eForm.note} onChange={e=>setEForm(f=>({...f,note:e.target.value}))} placeholder="e.g. Post-match dinner"/></div>
      <div className="form-group">
        <label className="form-label">Who was involved? * ({involved.length} selected)</label>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6,marginBottom:8}}>
          <button className="btn btn-ghost btn-xs" onClick={()=>setInvolved(activePlayers.map(p=>p.PlayerID))}>All</button>
          <button className="btn btn-ghost btn-xs" onClick={()=>setInvolved([])}>None</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {activePlayers.map(p=>{ const isIn=involved.includes(p.PlayerID); return <div key={p.PlayerID} onClick={()=>toggleInvolved(p.PlayerID)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,cursor:"pointer",background:isIn?"var(--acbg)":"var(--bg3)",border:isIn?"1px solid var(--acborder)":"1px solid var(--border)"}}>
            <div style={{width:18,height:18,borderRadius:"50%",background:isIn?"var(--accent)":"var(--bg4)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"white"}}>{isIn?"✓":""}</div>
            <span style={{fontSize:13,fontWeight:isIn?600:400}}>{p.Name.split(" ")[0]}</span>
          </div>; })}
        </div>
      </div>
      {involved.length>0&&eForm.amount&&<div className="form-group">
        <label className="form-label">Custom amounts (leave blank for equal split)</label>
        <div style={{fontSize:12,color:"var(--text2)",marginBottom:8}}>Equal share: ${(Number(eForm.amount)/involved.length).toFixed(1)} each</div>
        {involved.map(pid=>{ const p=players.find(x=>x.PlayerID===pid); if(!p)return null;
          return <div key={pid} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <span style={{flex:1,fontSize:13,fontWeight:500}}>{p.Name.split(" ")[0]}</span>
            <span style={{fontSize:12,color:"var(--accent)",fontFamily:"var(--mono)",width:60,textAlign:"right"}}>${Number(previewShares[pid]||0).toFixed(1)}</span>
            <input type="number" min="0" placeholder="Override" value={overrides[pid]||""} onChange={e=>setOverrides(o=>({...o,[pid]:e.target.value}))} style={{width:90,fontSize:13,padding:"5px 8px"}}/>
          </div>; })}
        <div style={{background:"var(--bg3)",borderRadius:8,padding:"9px 12px",marginTop:4,display:"flex",justifyContent:"space-between",fontSize:13}}>
          <span style={{color:"var(--text2)"}}>Total allocated</span>
          <span style={{fontWeight:600,fontFamily:"var(--mono)",color:Math.abs(Object.values(previewShares).reduce((s,v)=>s+v,0)-Number(eForm.amount))<0.2?"var(--green)":"var(--amber)"}}>
            ${Number(Object.values(previewShares).reduce((s,v)=>s+v,0)).toFixed(1)} / ${Number(eForm.amount||0).toFixed(1)}
          </span>
        </div>
      </div>}
    </Modal>}

    {/* MANAGE / SEND REMINDERS MODAL */}
    {showManage&&<Modal title={showManage.title} onClose={()=>setShowManage(null)}>
      <div style={{background:"var(--bg3)",borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:13,display:"flex",justifyContent:"space-between"}}>
        <span style={{color:"var(--text2)"}}>Collected</span>
        <span style={{fontWeight:600,fontFamily:"var(--mono)",color:"var(--green)"}}>${paidAmount(showManage).toFixed(1)} / ${Number(showManage.amount).toFixed(1)}</span>
      </div>
      <div style={{fontSize:12,color:"var(--text2)",marginBottom:12}}>Players who haven't paid yet. Tap to send a WhatsApp reminder.</div>
      {showManage.involved.map(pid=>{
        const p=players.find(x=>x.PlayerID===pid);
        if(!p)return null;
        const share=Number((showManage.shares||{})[pid]||0);
        const paid=isPaid(showManage.id,pid);
        const msg=buildMsg(showManage,pid);
        return <div key={pid} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:500,fontSize:14,color:paid?"var(--text3)":"var(--text)"}}>{p.Name}</div>
            <div style={{fontSize:11,color:paid?"var(--green)":"var(--amber)",marginTop:1}}>{paid?"Paid":"Owes"} ${share.toFixed(1)}</div>
          </div>
          <button onClick={()=>togglePaid(showManage.id,pid,share)} className={"btn btn-sm "+(paid?"btn-ghost":"btn-primary")} style={{fontSize:11}}>
            {paid?"Unmark":"Mark paid"}
          </button>
          {!paid&&p.Phone&&<a className="btn btn-wa btn-sm" href={waLink(p.Phone,msg)} target="_blank" style={{textDecoration:"none",fontSize:11}}>Remind</a>}
        </div>;
      })}
    </Modal>}
  </div>;
}

// ── MAIN APP ─────────────────────────────────────────────────────
function App(){
  const playerParam=urlP.get("player");
  if(playerParam) return <PlayerAvailPage playerId={playerParam}/>;

  const [view,setView]=useState("dashboard");
  const [data,setData]=useState({players:[],matches:[],availability:{},payments:{},config:{}});
  const [syncStatus,setSyncStatus]=useState("loading");
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);
  const notify=msg=>setToast(msg);

  const loadData=useCallback(async()=>{ setSyncStatus("loading"); try{const d=await api.get({action:"getAll"});setData(d);setSyncStatus("ok");}catch(e){console.error(e);setSyncStatus("err");}finally{setLoading(false);} },[]);
  useEffect(()=>{loadData();},[loadData]);

  if(loading) return <div className="loading-screen"><div className="spinner"/><div style={{color:"var(--text2)",fontSize:13}}>Loading from Google Sheets…</div></div>;

  const navItems=[{id:"dashboard",icon:"◉",label:"Home"},{id:"players",icon:"👥",label:"Players"},{id:"matches",icon:"🏏",label:"Matches"},{id:"availability",icon:"✓",label:"Availability"},{id:"extras",icon:"🍕",label:"Extras"},{id:"finance",icon:"💰",label:"Finance"},{id:"settings",icon:"⚙",label:"Settings"}];
  const views={dashboard:<Dashboard data={data}/>,players:<Players data={data} reload={loadData} notify={notify}/>,matches:<Matches data={data} reload={loadData} notify={notify}/>,availability:<Availability data={data} reload={loadData} notify={notify}/>,extras:<Extras data={data} reload={loadData} notify={notify}/>,finance:<Finance data={data} reload={loadData} notify={notify}/>,settings:<Settings data={data} reload={loadData} notify={notify}/>};

  return <div className="app">
    <nav className="bottom-nav">
      <div className="nav-logo" style={{display:"none",padding:"12px 12px 14px",borderBottom:"1px solid var(--border)",marginBottom:6}}>
        <div style={{fontSize:20,marginBottom:4}}>🏏</div>
        <div style={{fontWeight:600,fontSize:13}}>{data.config?.ClubName||"MCC"}</div>
        <div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)"}}>{data.config?.SeasonName||"—"}</div>
      </div>
      {navItems.map(n=><button key={n.id} className={"nav-btn"+(view===n.id?" active":"")} onClick={()=>setView(n.id)}>
        <span className="nav-icon">{n.icon}</span><span className="nav-label">{n.label}</span>
      </button>)}
    </nav>
    <div className="app-main" style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
      <header className="app-header">
        <span style={{fontSize:20}}>🏏</span>
        <div style={{flex:1}}><div className="app-title">{data.config?.ClubName||"MCC"} Cricket</div><div className="app-season">{data.config?.SeasonName||"—"}</div></div>
        <div className={"sync-dot "+syncStatus}/>
        <button className="btn btn-ghost btn-sm" onClick={loadData} style={{padding:"5px 10px",fontSize:16}}>↻</button>
      </header>
      <div className="app-content">{views[view]}</div>
    </div>
    {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
