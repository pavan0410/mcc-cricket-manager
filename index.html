<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>MCC Cricket</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#0d0f12;--bg2:#141720;--bg3:#1c2030;--bg4:#262a3e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf0;--text2:#8b90a0;--text3:#4e5368;
  --green:#22c55e;--gbg:rgba(34,197,94,0.12);--gborder:rgba(34,197,94,0.3);
  --red:#f87171;--rbg:rgba(248,113,113,0.12);--rborder:rgba(248,113,113,0.3);
  --amber:#fbbf24;--abg:rgba(251,191,36,0.12);--aborder:rgba(251,191,36,0.3);
  --blue:#60a5fa;--bbg:rgba(96,165,250,0.12);
  --accent:#818cf8;--acbg:rgba(129,140,248,0.13);--acborder:rgba(129,140,248,0.32);
  --wa:#25D366;--wabg:rgba(37,211,102,0.13);--waborder:rgba(37,211,102,0.32);
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--rl:14px;--rx:18px;--nav-h:64px;--hdr-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;width:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;overflow:hidden;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
.app{display:flex;flex-direction:column;height:100vh;width:100%;overflow:hidden;}
.app-header{height:var(--hdr-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
.app-title{font-size:16px;font-weight:600;letter-spacing:-0.3px;flex:1;}
.app-season{font-size:11px;color:var(--text3);font-family:var(--mono);}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sync-dot.ok{background:var(--green);}
.sync-dot.loading{background:var(--amber);animation:pulse 1s infinite;}
.sync-dot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.app-content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav-h) + 8px);}
.bottom-nav{height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;position:fixed;bottom:0;left:0;right:0;z-index:20;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);border:none;background:none;font-family:var(--font);transition:color .15s;padding:6px 2px;}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:19px;line-height:1;}
.nav-label{font-size:10px;font-weight:600;}
@media(min-width:768px){
  .app{flex-direction:row;}
  .app-main{display:flex;flex-direction:column;flex:1;overflow:hidden;}
  .bottom-nav{position:static;height:auto;flex-direction:column;width:190px;border-top:none;border-right:1px solid var(--border);padding:12px 8px;gap:2px;justify-content:flex-start;}
  .nav-btn{flex:0 0 auto;flex-direction:row;justify-content:flex-start;gap:9px;padding:9px 12px;border-radius:8px;font-size:13.5px;}
  .nav-btn.active{background:var(--acbg);border:1px solid var(--acborder);}
  .nav-icon{font-size:15px;}
  .nav-label{font-size:13px;font-weight:500;}
  .app-content{padding-bottom:0;}
  .nav-logo{padding:12px 12px 16px;border-bottom:1px solid var(--border);margin-bottom:8px;}
}
.page{padding:16px;}
.page-title{font-size:20px;font-weight:600;letter-spacing:-0.4px;margin-bottom:2px;}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:18px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:12px;}
.card-hdr{padding:12px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.card-title{font-size:14px;font-weight:600;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:13px 14px;}
.stat-val{font-size:24px;font-weight:600;letter-spacing:-0.8px;line-height:1.1;}
.stat-val.g{color:var(--green);}
.stat-val.a{color:var(--amber);}
.stat-val.b{color:var(--blue);}
.stat-val.r{color:var(--red);}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 15px;border-radius:var(--r);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:none;white-space:nowrap;text-decoration:none;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:disabled{opacity:.5;cursor:default;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);}
.btn-danger{background:var(--rbg);color:var(--red);border:1px solid var(--rborder);}
.btn-wa{background:var(--wabg);color:var(--wa);border:1px solid var(--waborder);font-weight:600;}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:8px;}
.btn-full{width:100%;display:flex;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:15px;padding:10px 12px;outline:none;transition:border-color .15s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
input::placeholder{color:var(--text3);}
select option{background:var(--bg3);}
.form-group{margin-bottom:13px;}
.form-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.editable{cursor:pointer;border-bottom:1px dashed var(--text3);padding-bottom:1px;transition:color .1s;}
.editable:hover{border-color:var(--accent);color:var(--accent);}
.edit-input{background:var(--bg3);border:1px solid var(--accent);border-radius:6px;color:var(--text);font-family:var(--font);font-size:14px;padding:4px 8px;outline:none;width:100%;max-width:180px;}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge.g{background:var(--gbg);color:var(--green);border:1px solid var(--gborder);}
.badge.r{background:var(--rbg);color:var(--red);border:1px solid var(--rborder);}
.badge.a{background:var(--abg);color:var(--amber);border:1px solid var(--aborder);}
.badge.b{background:var(--bbg);color:var(--blue);}
.badge.gray{background:var(--bg3);color:var(--text2);}
.avail-dot{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:transform .1s;user-select:none;}
.avail-dot.yes{background:var(--gbg);color:var(--green);border-color:var(--gborder);}
.avail-dot.no{background:var(--rbg);color:var(--red);border-color:var(--rborder);}
.avail-dot.tbd{background:var(--bg3);color:var(--text3);border-color:var(--border);}
.avail-dot:active{transform:scale(.88);}
.avail-dot.saving{opacity:.4;pointer-events:none;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:flex-end;z-index:100;}
@media(min-width:768px){.modal-overlay{align-items:center;justify-content:center;padding:20px;}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rx) var(--rx) 0 0;width:100%;max-height:92vh;overflow-y:auto;}
@media(min-width:768px){.modal{border-radius:var(--rx);max-width:480px;}}
.modal-hdr{padding:18px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1;}
.modal-title{font-size:16px;font-weight:600;}
.modal-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:22px;padding:2px 6px;}
.modal-body{padding:18px;}
.modal-footer{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg2);}
.tabs{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:3px;margin-bottom:16px;overflow-x:auto;}
.tab-btn{flex-shrink:0;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);border:none;background:none;font-family:var(--font);white-space:nowrap;}
.tab-btn.active{background:var(--bg4);color:var(--text);}
.bal-bar{height:4px;border-radius:2px;background:var(--bg3);overflow:hidden;margin-top:5px;}
.bal-fill{height:100%;border-radius:2px;transition:width .3s;}
.toast{position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);border-radius:20px;padding:10px 18px;font-size:13px;color:var(--text);z-index:300;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.4);}
@media(min-width:768px){.toast{bottom:20px;}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;}
.spinner{width:32px;height:32px;border:2.5px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.pa-page{max-width:460px;margin:0 auto;padding:24px 16px 40px;}
.pa-hdr{text-align:center;padding:20px 0 28px;}
.pa-match{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:12px;}
.pa-round{font-weight:600;font-size:16px;}
.pa-date{font-size:12px;color:var(--text3);margin-top:2px;font-family:var(--mono);}
.pa-btns{display:flex;gap:8px;margin-top:13px;}
.pa-btn{flex:1;padding:11px;border-radius:var(--r);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .15s;}
.pa-btn.yes{background:var(--gbg);border-color:var(--gborder);color:var(--green);}
.pa-btn.no{background:var(--rbg);border-color:var(--rborder);color:var(--red);}
.match-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:13px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.mdb{background:var(--bg3);border-radius:8px;padding:5px 9px;text-align:center;flex-shrink:0;min-width:44px;}
.mdb-d{font-size:17px;font-weight:600;line-height:1;}
.mdb-m{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;}
.player-avatar{width:36px;height:36px;border-radius:50%;background:var(--acbg);border:1px solid var(--acborder);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--accent);flex-shrink:0;}
.next-banner{background:linear-gradient(135deg,rgba(129,140,248,0.1),var(--bg3));border:1px solid var(--acborder);border-radius:var(--rl);padding:15px;margin-bottom:15px;}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxgjPEvAewenmm8KiGRziPkTmdk87uWdUczvvwPnoNV9_ZVZBpp79NrYvNocHo9Ga70/exec";
const IS_CONFIGURED = true;

const api = {
  get: async (p) => {
    const r = await fetch(APPS_SCRIPT_URL+"?"+new URLSearchParams(p));
    const j = await r.json();
    if(j.status==="error") throw new Error(j.data?.error||"API error");
    return j.data;
  },
  post: async (body) => {
    const p = {};
    Object.entries(body).forEach(([k,v])=>{ p[k]=typeof v==="object"?encodeURIComponent(JSON.stringify(v)):v; });
    const r = await fetch(APPS_SCRIPT_URL+"?"+new URLSearchParams(p));
    const j = await r.json();
    if(j.status==="error") throw new Error(j.data?.error||"API error");
    return j.data;
  }
};

const fmt = d=>{ if(!d) return "—"; return new Date(d.toString().slice(0,10)+"T00:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"short"}); };
const fmtFull = d=>{ if(!d) return ""; return new Date(d.toString().slice(0,10)+"T00:00:00").toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short",year:"numeric"}); };
const fmtD = d=>{ if(!d) return ""; return new Date(d.toString().slice(0,10)+"T00:00:00").toLocaleDateString("en-AU",{day:"numeric"}); };
const fmtM = d=>{ if(!d) return ""; return new Date(d.toString().slice(0,10)+"T00:00:00").toLocaleDateString("en-AU",{month:"short"}); };
const tc = m=>["GroundHire","Balls","Umpire","MatchFee","Extras"].reduce((s,k)=>s+(Number(m[k])||0),0);
const uid = ()=>"id_"+Math.random().toString(36).slice(2,9);
const waLink = (phone,msg)=>`https://wa.me/${phone.replace(/\D/g,"")}?text=${encodeURIComponent(msg)}`;
const urlP = new URLSearchParams(window.location.search);

const calcStats = (players,matches,availability,payments)=>players.map(p=>{
  const pid=p.PlayerID, pmts=payments[pid]||[];
  const totalAdvance=pmts.reduce((s,x)=>s+Number(x.Amount||0),0);
  const played=matches.filter(m=>(availability[m.MatchID]||{})[pid]==="yes");
  const totalOwed=played.reduce((s,m)=>{ const cnt=Object.values(availability[m.MatchID]||{}).filter(v=>v==="yes").length; return s+(cnt>0?tc(m)/cnt:0); },0);
  return {...p,totalAdvance,totalOwed,balance:totalAdvance-totalOwed,gamesPlayed:played.length,pmts};
});

function Toast({msg,onDone}){ useEffect(()=>{const t=setTimeout(onDone,2500);return()=>clearTimeout(t);},[]);return <div className="toast">✓ {msg}</div>; }

function Modal({title,children,footer,onClose}){
  return <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <div className="modal-hdr"><span className="modal-title">{title}</span><button className="modal-close" onClick={onClose}>×</button></div>
      <div className="modal-body">{children}</div>
      {footer&&<div className="modal-footer">{footer}</div>}
    </div>
  </div>;
}

function InlineEdit({value,onSave,type="text",options=null,placeholder=""}){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(value);
  const ref=useRef();
  useEffect(()=>{if(editing&&ref.current)ref.current.focus();},[editing]);
  const save=()=>{setEditing(false);if(String(val)!==String(value))onSave(val);};
  if(editing){
    if(options) return <select ref={ref} value={val} onChange={e=>setVal(e.target.value)} onBlur={save} className="edit-input">{options.map(o=><option key={o}>{o}</option>)}</select>;
    return <input ref={ref} type={type} value={val} onChange={e=>setVal(e.target.value)} onBlur={save} onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape"){setVal(value);setEditing(false);}}} className="edit-input" placeholder={placeholder}/>;
  }
  return <span className="editable" onClick={()=>{setVal(value);setEditing(true);}}>{value||<span style={{color:"var(--text3)"}}>tap to edit</span>}</span>;
}

// ── PLAYER AVAILABILITY PAGE ─────────────────────────────────────
function PlayerAvailPage({playerId}){
  const [data,setData]=useState(null),[saving,setSaving]=useState({}),[err,setErr]=useState(null);
  useEffect(()=>{ api.get({action:"getPlayerData",playerId}).then(setData).catch(e=>setErr(e.message)); },[]);
  const setStatus=async(matchId,status)=>{
    setSaving(s=>({...s,[matchId]:true}));
    try{
      await api.post({action:"setAvailability",playerId,matchId,status});
      setData(d=>{const av={...(d.availability||{})};if(!av[matchId])av[matchId]={};av[matchId][playerId]=status;return{...d,availability:av};});
    }catch(e){alert("Save failed: "+e.message);}
    finally{setSaving(s=>({...s,[matchId]:false}));}
  };
  if(err) return <div className="loading-screen"><div style={{color:"var(--red)",fontSize:14,padding:20,textAlign:"center"}}>{err}</div></div>;
  if(!data) return <div className="loading-screen"><div className="spinner"/><div style={{color:"var(--text2)",fontSize:13}}>Loading…</div></div>;
  const {player,matches,availability,config}=data;
  const today=new Date().toISOString().slice(0,10);
  const upcoming=[...matches].filter(m=>(m.Date||"").toString().slice(0,10)>=today).sort((a,b)=>a.Date.toString().localeCompare(b.Date.toString()));
  return <div className="pa-page">
    <div className="pa-hdr">
      <div style={{fontSize:36,marginBottom:8}}>🏏</div>
      <div style={{fontSize:22,fontWeight:600}}>{config?.ClubName||"MCC"} Cricket</div>
      <div style={{fontSize:14,color:"var(--text2)",marginTop:4}}>Hey {player.Name.split(" ")[0]}, mark your availability for {config?.SeasonName||"this season"}</div>
    </div>
    {upcoming.length===0&&<div style={{textAlign:"center",color:"var(--text3)",padding:"40px 0"}}><div style={{fontSize:32,marginBottom:10}}>✅</div><div>No upcoming matches — you're all done!</div></div>}
    {upcoming.map(m=>{
      const cur=(availability[m.MatchID]||{})[playerId]||"tbd";
      return <div key={m.MatchID} className="pa-match">
        <div className="pa-round">{m.Round}{m.Opponent?` vs ${m.Opponent}`:""}</div>
        <div className="pa-date">{fmtFull(m.Date)}{m.Venue?` · ${m.Venue}`:""}</div>
        <div className="pa-btns">
          <button className={"pa-btn"+(cur==="yes"?" yes":"")} onClick={()=>setStatus(m.MatchID,"yes")} disabled={saving[m.MatchID]}>{saving[m.MatchID]?"…":"✓ I'm in"}</button>
          <button className={"pa-btn"+(cur==="no"?" no":"")} onClick={()=>setStatus(m.MatchID,"no")} disabled={saving[m.MatchID]}>{saving[m.MatchID]?"…":"✕ Can't make it"}</button>
        </div>
        {cur!=="tbd"&&!saving[m.MatchID]&&<div style={{fontSize:11,color:"var(--text3)",marginTop:8,textAlign:"center"}}>Saved as <span style={{color:cur==="yes"?"var(--green)":"var(--red)",fontWeight:600}}>{cur==="yes"?"available":"unavailable"}</span> · tap to change</div>}
      </div>;
    })}
    <div style={{fontSize:11,color:"var(--text3)",textAlign:"center",marginTop:24}}>MCC Cricket Manager · Changes save instantly</div>
  </div>;
}

// ── DASHBOARD ────────────────────────────────────────────────────
function Dashboard({data}){
  const {players=[],matches=[],availability={},payments={},config={}}=data;
  const today=new Date().toISOString().slice(0,10);
  const upcoming=[...matches].filter(m=>(m.Date||"").toString().slice(0,10)>=today).sort((a,b)=>a.Date.toString().localeCompare(b.Date.toString()));
  const past=matches.filter(m=>(m.Date||"").toString().slice(0,10)<today);
  const next=upcoming[0];
  const nextAvail=next?Object.values(availability[next.MatchID]||{}).filter(v=>v==="yes").length:0;
  const stats=calcStats(players,matches,availability,payments);
  const outstanding=stats.reduce((s,p)=>s+(p.balance<0?Math.abs(p.balance):0),0);
  const debtors=stats.filter(p=>p.balance<-0.5).length;
  return <div className="page">
    {next&&<div className="next-banner">
      <div style={{fontSize:11,fontWeight:600,color:"var(--accent)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:5}}>Next match</div>
      <div style={{fontSize:18,fontWeight:600}}>{next.Round}{next.Opponent?` vs ${next.Opponent}`:""}</div>
      <div style={{fontSize:13,color:"var(--text2)",marginTop:2}}>{fmtFull(next.Date)}{next.Venue?` · ${next.Venue}`:""}</div>
      <div style={{display:"flex",gap:20,marginTop:10}}>
        <div><div style={{fontSize:20,fontWeight:600,color:nextAvail>=9?"var(--green)":nextAvail>=7?"var(--amber)":"var(--red)"}}>{nextAvail}</div><div style={{fontSize:10,color:"var(--text3)"}}>CONFIRMED</div></div>
        <div><div style={{fontSize:20,fontWeight:600}}>{upcoming.length}</div><div style={{fontSize:10,color:"var(--text3)"}}>LEFT</div></div>
        <div><div style={{fontSize:20,fontWeight:600}}>{past.length}</div><div style={{fontSize:10,color:"var(--text3)"}}>PLAYED</div></div>
      </div>
    </div>}
    <div className="stat-grid">
      <div className="stat-card"><div className="stat-val b">{players.filter(p=>p.Active==="Yes").length}</div><div className="stat-lbl">Players</div></div>
      <div className="stat-card"><div className="stat-val">{past.length}/{matches.length}</div><div className="stat-lbl">Games</div></div>
      <div className="stat-card"><div className="stat-val a">{debtors}</div><div className="stat-lbl">Unpaid</div></div>
      <div className="stat-card"><div className="stat-val r">${outstanding.toFixed(0)}</div><div className="stat-lbl">Outstanding</div></div>
    </div>
    <div className="section-hdr"><span className="section-title">Upcoming</span></div>
    {upcoming.slice(0,5).map(m=>{
      const y=Object.values(availability[m.MatchID]||{}).filter(v=>v==="yes").length;
      return <div key={m.MatchID} className="match-card">
        <div className="mdb"><div className="mdb-d">{fmtD(m.Date)}</div><div className="mdb-m">{fmtM(m.Date)}</div></div>
        <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{m.Round}</div><div style={{fontSize:12,color:"var(--text2)"}}>{m.Opponent?"vs "+m.Opponent:"—"}</div></div>

  </div>;
}

// ── PLAYERS ──────────────────────────────────────────────────────
function Players({data,reload,notify}){

            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5,alignItems:"flex-end"}}>
              <span className={"badge "+(s.Active==="Yes"?"g":"gray")} style={{cursor:"default"}}><InlineEdit value={s.Active} onSave={v=>updateField(s,"Active",v)} options={["Yes","No"]}/></span>
              <span className="badge gray" style={{cursor:"default"}}><InlineEdit value={s.Role||"Batsman"} onSave={v=>updateField(s,"Role",v)} options={roles}/></span>

        <div className="form-group"><label className="form-label">Date</label><input type="date" value={advForm.date} onChange={e=>setAdvForm(f=>({...f,date:e.target.value}))}/></div>

// ── MATCHES ──────────────────────────────────────────────────────
function Matches({data,reload,notify}){
  const {players=[],matches=[],availability={},payments={},config={}}=data;
  const [tab,setTab]=useState("upcoming"),[showAdd,setShowAdd]=useState(false),[showCosts,setShowCosts]=useState(null),[showPostGame,setShowPostGame]=useState(null),[showAvail,setShowAvail]=useState(null);
  const [mForm,setMForm]=useState({Date:"",Round:"",Venue:"",Opponent:""}),[cForm,setCForm]=useState({}),[saving,setSaving]=useState(false);
  const today=new Date().toISOString().slice(0,10);
  const sorted=[...matches].sort((a,b)=>a.Date.toString().localeCompare(b.Date.toString()));
  const list=tab==="upcoming"?sorted.filter(m=>m.Date.toString().slice(0,10)>=today):sorted.filter(m=>m.Date.toString().slice(0,10)<today);

  const saveMatch=async()=>{ if(!mForm.Date||!mForm.Round)return; setSaving(true); try{await api.post({action:"addMatch",match:{MatchID:uid(),...mForm}});notify("Match added");setShowAdd(false);reload();}catch(e){alert(e.message);}finally{setSaving(false);} };
  const saveCosts=async()=>{ setSaving(true); try{await api.post({action:"updateMatchCosts",matchId:showCosts.MatchID,costs:cForm});notify("Costs saved");setShowCosts(null);reload();}catch(e){alert(e.message);}finally{setSaving(false);} };
  const updMatch=async(m,field,value)=>{ try{await api.post({action:"updateMatch",match:{...m,[field]:value}});notify("Saved");reload();}catch(e){alert(e.message);} };
  const toggleAvail=async(matchId,playerId)=>{ const cur=(availability[matchId]||{})[playerId]||"tbd"; const next=cur==="tbd"?"yes":cur==="yes"?"no":"tbd"; try{await api.post({action:"setAvailability",playerId,matchId,status:next});reload();}catch(e){alert(e.message);} };

  const postGameMsg=(m,p)=>{
    const cnt=Object.values(availability[m.MatchID]||{}).filter(v=>v==="yes").length;
    const share=cnt>0?tc(m)/cnt:0;
    const ps=calcStats([p],matches,availability,payments)[0];
    return `Hey ${p.Name.split(" ")[0]} 🏏\n\n*${m.Round} costs*\n${m.GroundHire>0?`Ground: $${m.GroundHire}\n`:""}${m.Balls>0?`Balls: $${m.Balls}\n`:""}${m.Umpire>0?`Umpire: $${m.Umpire}\n`:""}${m.MatchFee>0?`Match fee: $${m.MatchFee}\n`:""}${m.Extras>0?`Extras: $${m.Extras}\n`:""}\nTotal: $${tc(m).toFixed(2)} ÷ ${cnt} = *$${share.toFixed(2)} your share*\n\nBalance: ${ps.balance>=0?"✅ $"+ps.balance.toFixed(2)+" credit":"⚠️ $"+Math.abs(ps.balance).toFixed(2)+" due"} 🏏`;
  };

  return <div className="page">
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
      <div><div className="page-title">Matches</div><div className="page-sub">{matches.length} total</div></div>
      <button className="btn btn-primary btn-sm" onClick={()=>{setMForm({Date:"",Round:"",Venue:"",Opponent:""});setShowAdd(true);}}>+ Add</button>
    </div>
    <div className="tabs">
      <button className={"tab-btn"+(tab==="upcoming"?" active":"")} onClick={()=>setTab("upcoming")}>Upcoming ({sorted.filter(m=>m.Date.toString().slice(0,10)>=today).length})</button>
      <button className={"tab-btn"+(tab==="past"?" active":"")} onClick={()=>setTab("past")}>Past ({sorted.filter(m=>m.Date.toString().slice(0,10)<today).length})</button>
    </div>
    {list.map(m=>{
      const y=Object.values(availability[m.MatchID]||{}).filter(v=>v==="yes").length;
      const totalC=tc(m);
      return <div key={m.MatchID} className="card">
        <div style={{padding:"13px 15px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div>
              <div style={{fontWeight:600,fontSize:15}}><InlineEdit value={m.Round} onSave={v=>updMatch(m,"Round",v)}/></div>
              <div style={{fontSize:12,color:"var(--text3)",fontFamily:"var(--mono)",marginTop:1}}><InlineEdit value={m.Date.toString().slice(0,10)} onSave={v=>updMatch(m,"Date",v)} type="date"/></div>
            </div>
            <span className={"badge "+(y>=9?"g":y>=7?"a":"gray")}>{y} avail</span>
          </div>
          <div style={{fontSize:13,color:"var(--text2)",display:"flex",gap:14,marginBottom:10,flexWrap:"wrap"}}>
            <span>vs <InlineEdit value={m.Opponent||""} onSave={v=>updMatch(m,"Opponent",v)} placeholder="Opposition"/></span>
            <span>📍 <InlineEdit value={m.Venue||""} onSave={v=>updMatch(m,"Venue",v)} placeholder="Venue"/></span>
          </div>
          {totalC>0&&<div style={{background:"var(--bg3)",borderRadius:8,padding:"7px 11px",marginBottom:10,fontSize:12,display:"flex",justifyContent:"space-between"}}>
            <span style={{color:"var(--text2)"}}>Cost</span>
            <span style={{fontFamily:"var(--mono)",fontWeight:600,color:"var(--accent)"}}>${totalC.toFixed(2)}{y>0?` · $${(totalC/y).toFixed(2)}/player`:""}</span>
          </div>}
          <div className="btn-row">
            <button className="btn btn-ghost btn-sm" onClick={()=>{setCForm({groundHire:m.GroundHire||0,balls:m.Balls||0,umpire:m.Umpire||0,matchFee:m.MatchFee||0,extras:m.Extras||0});setShowCosts(m);}}>💰 Costs</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowAvail(m)}>✓ Squad</button>
            {totalC>0&&<button className="btn btn-wa btn-sm" onClick={()=>setShowPostGame(m)}>📤 Send costs</button>}
          </div>
        </div>
      </div>;
    })}

    {showAdd&&<Modal title="Add Match" onClose={()=>setShowAdd(false)} footer={<><button className="btn btn-ghost" onClick={()=>setShowAdd(false)}>Cancel</button><button className="btn btn-primary" onClick={saveMatch} disabled={saving}>{saving?"…":"Add"}</button></>}>
      <div className="form-row">
        <div className="form-group"><label className="form-label">Date *</label><input type="date" value={mForm.Date} onChange={e=>setMForm(f=>({...f,Date:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Round *</label><input value={mForm.Round} onChange={e=>setMForm(f=>({...f,Round:e.target.value}))} placeholder="Round 1"/></div>
      </div>
      <div className="form-group"><label className="form-label">Venue</label><input value={mForm.Venue} onChange={e=>setMForm(f=>({...f,Venue:e.target.value}))} placeholder="Ground name"/></div>
      <div className="form-group"><label className="form-label">Opposition</label><input value={mForm.Opponent} onChange={e=>setMForm(f=>({...f,Opponent:e.target.value}))} placeholder="Opponent team"/></div>
    </Modal>}

    {showCosts&&<Modal title={`Costs — ${showCosts.Round}`} onClose={()=>setShowCosts(null)} footer={<><button className="btn btn-ghost" onClick={()=>setShowCosts(null)}>Cancel</button><button className="btn btn-primary" onClick={saveCosts} disabled={saving}>{saving?"…":"Save"}</button></>}>
      {[["groundHire","Ground hire"],["balls","Balls"],["umpire","Umpire"],["matchFee","Match fee"],["extras","Extras"]].map(([k,lbl])=><div key={k} className="form-group"><label className="form-label">{lbl} ($)</label><input type="number" min="0" value={cForm[k]||0} onChange={e=>setCForm(f=>({...f,[k]:e.target.value}))}/></div>)}
      <div style={{background:"var(--bg3)",borderRadius:8,padding:"9px 12px",display:"flex",justifyContent:"space-between",fontSize:14}}>
        <span style={{color:"var(--text2)"}}>Total</span><span style={{fontWeight:600,fontFamily:"var(--mono)"}}>${Object.values(cForm).reduce((s,v)=>s+Number(v||0),0).toFixed(2)}</span>
      </div>
    </Modal>}

    {showAvail&&<Modal title={`Squad — ${showAvail.Round}`} onClose={()=>setShowAvail(null)}>
      <div style={{fontSize:12,color:"var(--text2)",marginBottom:14}}>Tap a dot to toggle availability</div>
      {players.filter(p=>p.Active==="Yes").map(p=>{
        const val=(availability[showAvail.MatchID]||{})[p.PlayerID]||"tbd";
        return <div key={p.PlayerID} style={{display:"flex",alignItems:"center",gap:12,padding:"9px 0",borderBottom:"1px solid var(--border)"}}>
          <span style={{flex:1,fontWeight:500}}>{p.Name}</span>
          <div className={"avail-dot "+val} onClick={()=>toggleAvail(showAvail.MatchID,p.PlayerID)}>{val==="yes"?"✓":val==="no"?"✕":"?"}</div>
        </div>;
      })}
    </Modal>}

    {showPostGame&&<Modal title={`Send costs — ${showPostGame.Round}`} onClose={()=>setShowPostGame(null)}>
      <div style={{fontSize:13,color:"var(--text2)",marginBottom:14}}>Opens WhatsApp with personalised message for each player who played.</div>
      {players.filter(p=>(availability[showPostGame.MatchID]||{})[p.PlayerID]==="yes").map(p=>{
        const msg=postGameMsg(showPostGame,p);
        return <div key={p.PlayerID} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
          <span style={{flex:1,fontWeight:500}}>{p.Name}</span>
          {p.Phone?<a className="btn btn-wa btn-sm" href={waLink(p.Phone,msg)} target="_blank">Send ↗</a>:<span style={{fontSize:11,color:"var(--text3)"}}>No phone</span>}
        </div>;
      })}
    </Modal>}
  </div>;
}

// ── AVAILABILITY ─────────────────────────────────────────────────
function Availability({data,reload,notify}){
  const {players=[],matches=[],availability={},config={}}=data;
  const [saving,setSaving]=useState({});
  const today=new Date().toISOString().slice(0,10);
  const upcoming=[...matches].filter(m=>m.Date.toString().slice(0,10)>=today).sort((a,b)=>a.Date.toString().localeCompare(b.Date.toString()));
  const baseUrl=window.location.href.split("?")[0];
  const toggle=async(matchId,playerId)=>{ const key=matchId+"_"+playerId; const cur=(availability[matchId]||{})[playerId]||"tbd"; const next=cur==="tbd"?"yes":cur==="yes"?"no":"tbd"; setSaving(s=>({...s,[key]:true})); try{await api.post({action:"setAvailability",playerId,matchId,status:next});reload();}catch(e){alert(e.message);}finally{setSaving(s=>({...s,[key]:false}));} };
  const copyAll=()=>{ const lines=players.filter(p=>p.Active==="Yes").map(p=>`${p.Name}: ${baseUrl}?player=${p.PlayerID}`); navigator.clipboard.writeText(`Hey team 🏏\n\nMark your availability for ${config?.SeasonName||"the season"}:\n\n${lines.join("\n")}\n\nTakes 30 seconds!`).catch(()=>{}); notify("Group message copied!"); };

  return <div className="page">
    <div className="page-title">Availability</div>
    <div className="page-sub">Tap dots to update · send personal links to players</div>
    <button className="btn btn-ghost btn-full" style={{marginBottom:14}} onClick={copyAll}>📋 Copy bulk WhatsApp message</button>
    <div style={{overflowX:"auto",marginBottom:16,WebkitOverflowScrolling:"touch"}}>
      <table style={{borderCollapse:"collapse",minWidth:420}}>
        <thead><tr>
          <th style={{padding:"6px 10px 6px 0",textAlign:"left",fontSize:10,color:"var(--text3)",fontWeight:600,textTransform:"uppercase",position:"sticky",left:0,background:"var(--bg)",whiteSpace:"nowrap"}}>Player</th>
          {upcoming.slice(0,7).map(m=>{ const y=Object.values(availability[m.MatchID]||{}).filter(v=>v==="yes").length; return <th key={m.MatchID} style={{padding:"4px 5px",textAlign:"center",fontSize:10,color:"var(--text3)",minWidth:46}}>
            <div style={{fontWeight:600}}>{m.Round.replace("Round ","R")}</div>
            <div style={{fontSize:9}}>{fmt(m.Date)}</div>
            <div style={{color:y>=9?"var(--green)":y>=7?"var(--amber)":"var(--text3)",marginTop:1}}>{y}✓</div>
          </th>; })}
        </tr></thead>
        <tbody>{players.filter(p=>p.Active==="Yes").map(p=><tr key={p.PlayerID}>
          <td style={{padding:"5px 10px 5px 0",fontWeight:500,fontSize:13,whiteSpace:"nowrap",position:"sticky",left:0,background:"var(--bg)"}}>{p.Name}</td>
          {upcoming.slice(0,7).map(m=>{ const key=m.MatchID+"_"+p.PlayerID; const val=(availability[m.MatchID]||{})[p.PlayerID]||"tbd"; return <td key={m.MatchID} style={{padding:"4px 5px",textAlign:"center"}} onClick={()=>toggle(m.MatchID,p.PlayerID)}>
            <div className={"avail-dot "+val+(saving[key]?" saving":"")}>{val==="yes"?"✓":val==="no"?"✕":"?"}</div>
          </td>; })}
        </tr>)}</tbody>
      </table>
    </div>
    <div className="section-hdr"><span className="section-title">Send individual links</span></div>
    {players.filter(p=>p.Active==="Yes").map(p=>{ const link=`${baseUrl}?player=${p.PlayerID}`; const msg=`Hey ${p.Name.split(" ")[0]} 🏏 Mark your availability: ${link}`; return <div key={p.PlayerID} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 0",borderBottom:"1px solid var(--border)"}}>
      <span style={{flex:1,fontWeight:500,fontSize:14}}>{p.Name}</span>
      {p.Phone?<a className="btn btn-wa btn-sm" href={waLink(p.Phone,msg)} target="_blank">Send 📱</a>:<button className="btn btn-ghost btn-sm" onClick={()=>{navigator.clipboard.writeText(link).catch(()=>{});notify(`Link copied for ${p.Name}`);}}>Copy link</button>}
    </div>; })}
  </div>;
}

// ── FINANCE ──────────────────────────────────────────────────────
function Finance({data,reload,notify}){
  const {players=[],matches=[],availability={},payments={},config={}}=data;
  const [tab,setTab]=useState("balances");
  const stats=calcStats(players,matches,availability,payments);
  const totalAdv=stats.reduce((s,p)=>s+p.totalAdvance,0);
  const totalOwed=stats.reduce((s,p)=>s+p.totalOwed,0);
  const outstanding=stats.reduce((s,p)=>s+(p.balance<0?Math.abs(p.balance):0),0);
  const balMsg=s=>`Hey ${s.Name.split(" ")[0]} 💰\n\nMCC cricket summary:\nGames played: ${s.gamesPlayed}\nOwed: $${s.totalOwed.toFixed(2)}\nAdvance paid: $${s.totalAdvance.toFixed(2)}\nBalance: ${s.balance>=0?"✅ $"+s.balance.toFixed(2)+" credit":"⚠️ $"+Math.abs(s.balance).toFixed(2)+" due"}${s.balance<-0.5?`\n\nBSB: ${config?.BankBSB||"XXX"} Acc: ${config?.BankAccount||"XXX"}\nRef: ${s.Name.replace(" ","").toUpperCase()}`:""}`;

  return <div className="page">
    <div className="page-title">Finance</div>
    <div className="page-sub">Advance payments, deductions & balances</div>
    <div className="stat-grid" style={{gridTemplateColumns:"1fr 1fr 1fr"}}>
      <div className="stat-card"><div className="stat-val g" style={{fontSize:20}}>${totalAdv.toFixed(0)}</div><div className="stat-lbl">Advance</div></div>
      <div className="stat-card"><div className="stat-val" style={{fontSize:20}}>${totalOwed.toFixed(0)}</div><div className="stat-lbl">Owed</div></div>
      <div className="stat-card"><div className="stat-val r" style={{fontSize:20}}>${outstanding.toFixed(0)}</div><div className="stat-lbl">Due</div></div>
    </div>
    <div className="tabs">
      <button className={"tab-btn"+(tab==="balances"?" active":"")} onClick={()=>setTab("balances")}>Balances</button>
      <button className={"tab-btn"+(tab==="costs"?" active":"")} onClick={()=>setTab("costs")}>Game costs</button>
    </div>
    {tab==="balances"&&stats.map(s=>{ const pct=s.totalOwed>0?Math.min(100,(s.totalAdvance/s.totalOwed)*100):100; return <div key={s.PlayerID} className="card" style={{marginBottom:10}}>
      <div style={{padding:"12px 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <span style={{fontWeight:600,flex:1}}>{s.Name}</span>
          <span className={"badge "+(s.balance>=0?"g":"r")}>{s.balance>=0?"+":""}{s.balance.toFixed(2)}</span>
        </div>
        <div style={{fontSize:12,color:"var(--text2)",display:"flex",gap:12,flexWrap:"wrap",marginBottom:6}}>
          <span>🎮 {s.gamesPlayed} games</span><span>⬆ ${s.totalAdvance.toFixed(0)} paid</span><span>💸 ${s.totalOwed.toFixed(2)} owed</span>
        </div>
        <div className="bal-bar"><div className="bal-fill" style={{width:pct+"%",background:s.balance>=0?"var(--green)":"var(--amber)"}}/></div>
        {s.Phone&&<a className="btn btn-wa btn-sm btn-full" style={{marginTop:10}} href={waLink(s.Phone,balMsg(s))} target="_blank">📤 Send balance via WhatsApp</a>}
      </div>
    </div>; })}
    {tab==="costs"&&[...matches].sort((a,b)=>a.Date.toString().localeCompare(b.Date.toString())).map(m=>{ const y=Object.values(availability[m.MatchID]||{}).filter(v=>v==="yes").length; const totalC=tc(m); const cpp=y>0?totalC/y:0; return <div key={m.MatchID} className="card" style={{marginBottom:10}}>
      <div style={{padding:"12px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:totalC>0?6:0}}>
          <div><span style={{fontWeight:600}}>{m.Round}</span><span style={{fontSize:12,color:"var(--text3)",marginLeft:8,fontFamily:"var(--mono)"}}>{fmt(m.Date)}</span></div>
          {totalC>0?<span style={{fontFamily:"var(--mono)",fontWeight:600,color:"var(--accent)"}}>${totalC.toFixed(0)}</span>:<span style={{color:"var(--text3)",fontSize:12}}>No costs yet</span>}
        </div>
        {totalC>0&&<div style={{fontSize:12,color:"var(--text2)",display:"flex",gap:10,flexWrap:"wrap"}}>
          {m.GroundHire>0&&<span>Ground ${m.GroundHire}</span>}{m.Balls>0&&<span>Balls ${m.Balls}</span>}{m.Umpire>0&&<span>Umpire ${m.Umpire}</span>}{m.MatchFee>0&&<span>Fee ${m.MatchFee}</span>}{m.Extras>0&&<span>Extras ${m.Extras}</span>}
          <span style={{color:"var(--accent)",fontWeight:600}}>{y}p · ${cpp.toFixed(2)}/each</span>
        </div>}
      </div>
    </div>; })}
  </div>;
}

// ── SETTINGS ─────────────────────────────────────────────────────
function Settings({data,reload,notify}){
  const {config={},players=[],matches=[]}=data;
  const [showNewSeason,setShowNewSeason]=useState(false),[nsName,setNsName]=useState(""),[saving,setSaving]=useState(false);
  const updCfg=async(key,value)=>{ try{await api.post({action:"updateConfig",key,value});notify("Saved");reload();}catch(e){alert(e.message);} };
  const createSeason=async()=>{ if(!nsName.trim())return; setSaving(true); try{await api.post({action:"createSeason",seasonName:nsName});notify("New season created!");setShowNewSeason(false);reload();}catch(e){alert(e.message);}finally{setSaving(false);} };
  const cfgFields=[["SeasonName","Season name"],["ClubName","Club name"],["MinPlayersNeeded","Min players needed"],["TargetSquadSize","Target squad size"],["BankBSB","Bank BSB"],["BankAccount","Bank account"],["PaymentRef","Payment reference"],["CaptainName","Captain name"],["CaptainPhone","Captain phone"]];

  return <div className="page">
    <div className="page-title">Settings</div>
    <div className="page-sub">Season config · tap any value to edit</div>
    <div className="card" style={{marginBottom:14}}>
      <div className="card-hdr"><span className="card-title">Season config</span></div>
      {cfgFields.map(([k,lbl])=><div key={k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 15px",borderBottom:"1px solid var(--border)"}}>
        <span style={{fontSize:12,color:"var(--text2)",fontWeight:500,flexShrink:0,marginRight:12}}>{lbl}</span>
        <span style={{fontSize:14,textAlign:"right"}}><InlineEdit value={String(config[k]||"")} onSave={v=>updCfg(k,v)} placeholder="tap to set"/></span>
      </div>)}
    </div>
    <div className="card">
      <div className="card-hdr"><span className="card-title">New season</span></div>
      <div style={{padding:15}}>
        <div style={{fontSize:13,color:"var(--text2)",marginBottom:12,lineHeight:1.7}}>Clears schedule, availability, and payments — keeps players. Old data stays in the sheet.</div>
        <div style={{display:"flex",gap:10,marginBottom:12}}>
          <div style={{background:"var(--bg3)",borderRadius:8,padding:"9px 12px",flex:1,textAlign:"center"}}><div style={{fontSize:20,fontWeight:600}}>{players.length}</div><div style={{fontSize:10,color:"var(--text3)"}}>PLAYERS KEPT</div></div>
          <div style={{background:"var(--bg3)",borderRadius:8,padding:"9px 12px",flex:1,textAlign:"center"}}><div style={{fontSize:20,fontWeight:600}}>{matches.length}</div><div style={{fontSize:10,color:"var(--text3)"}}>MATCHES CLEARED</div></div>
        </div>
        <button className="btn btn-danger btn-full" onClick={()=>setShowNewSeason(true)}>🔄 Start new season</button>
      </div>
    </div>
    {showNewSeason&&<Modal title="Start New Season" onClose={()=>setShowNewSeason(false)} footer={<><button className="btn btn-ghost" onClick={()=>setShowNewSeason(false)}>Cancel</button><button className="btn btn-primary" onClick={createSeason} disabled={saving}>{saving?"…":"Create"}</button></>}>
      <div style={{fontSize:13,color:"var(--text2)",marginBottom:14,lineHeight:1.7}}>This cannot be undone. All match, availability, and payment data will be cleared.</div>
      <div className="form-group"><label className="form-label">Season name *</label><input value={nsName} onChange={e=>setNsName(e.target.value)} placeholder="e.g. Winter 2026"/></div>
    </Modal>}
  </div>;
}

// ── MAIN APP ─────────────────────────────────────────────────────
function App(){
  const playerParam=urlP.get("player");
  if(playerParam) return <PlayerAvailPage playerId={playerParam}/>;

  const [view,setView]=useState("dashboard");
  const [data,setData]=useState({players:[],matches:[],availability:{},payments:{},config:{}});
  const [syncStatus,setSyncStatus]=useState("loading");
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);
  const notify=msg=>setToast(msg);

  const loadData=useCallback(async()=>{ setSyncStatus("loading"); try{const d=await api.get({action:"getAll"});setData(d);setSyncStatus("ok");}catch(e){console.error(e);setSyncStatus("err");}finally{setLoading(false);} },[]);
  useEffect(()=>{loadData();},[loadData]);

  if(loading) return <div className="loading-screen"><div className="spinner"/><div style={{color:"var(--text2)",fontSize:13}}>Loading from Google Sheets…</div></div>;

  const navItems=[{id:"dashboard",icon:"◉",label:"Home"},{id:"players",icon:"👥",label:"Players"},{id:"matches",icon:"🏏",label:"Matches"},{id:"availability",icon:"✓",label:"Avail"},{id:"finance",icon:"💰",label:"Finance"},{id:"settings",icon:"⚙",label:"Settings"}];
  const views={dashboard:<Dashboard data={data}/>,players:<Players data={data} reload={loadData} notify={notify}/>,matches:<Matches data={data} reload={loadData} notify={notify}/>,availability:<Availability data={data} reload={loadData} notify={notify}/>,finance:<Finance data={data} reload={loadData} notify={notify}/>,settings:<Settings data={data} reload={loadData} notify={notify}/>};

  return <div className="app">
    <nav className="bottom-nav">
      <div className="nav-logo" style={{display:"none",padding:"12px 12px 14px",borderBottom:"1px solid var(--border)",marginBottom:6}}>
        <div style={{fontSize:20,marginBottom:4}}>🏏</div>
        <div style={{fontWeight:600,fontSize:13}}>{data.config?.ClubName||"MCC"}</div>
        <div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)"}}>{data.config?.SeasonName||"—"}</div>
      </div>
      {navItems.map(n=><button key={n.id} className={"nav-btn"+(view===n.id?" active":"")} onClick={()=>setView(n.id)}>
        <span className="nav-icon">{n.icon}</span><span className="nav-label">{n.label}</span>
      </button>)}
    </nav>
    <div className="app-main" style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
      <header className="app-header">
        <span style={{fontSize:20}}>🏏</span>
        <div style={{flex:1}}><div className="app-title">{data.config?.ClubName||"MCC"} Cricket</div><div className="app-season">{data.config?.SeasonName||"—"}</div></div>
        <div className={"sync-dot "+syncStatus}/>
        <button className="btn btn-ghost btn-sm" onClick={loadData} style={{padding:"5px 10px",fontSize:16}}>↻</button>
      </header>
      <div className="app-content">{views[view]}</div>
    </div>
    {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
